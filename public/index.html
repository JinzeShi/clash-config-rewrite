<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clash Rewrite</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/vendor/codemirror/lib/codemirror.css">
  </head>
  <body>
    <div id="toast" class="toast" hidden></div>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Clash Rewrite</h1>
          <p id="statusText">Ready</p>
        </div>
        <button id="runButton" class="primary-button" type="button">Run Rewrite</button>
      </header>

      <section class="workspace">
        <aside class="sidebar">
          <div class="sidebar-header">Menu</div>
          <nav class="primary-nav">
            <button class="nav-button active" type="button" data-view="config">Config</button>
            <button class="nav-button" type="button" data-view="rewrite">Rewrite</button>
            <button class="nav-button" type="button" data-view="files">Files</button>
          </nav>
        </aside>

        <section class="content-area">
          <section id="configView" class="view-panel">
            <div class="view-header">
              <div>
                <h2>Config</h2>
                <p>Edit profile settings.</p>
              </div>
            </div>

            <section class="config-panel">
              <div class="path-grid">
                <label>
                  <span>Origin Dir</span>
                  <input id="originDirInput" type="text" readonly>
                </label>
                <label>
                  <span>Output Dir</span>
                  <input id="outputDirInput" type="text" readonly>
                </label>
              </div>

              <div class="config-toolbar">
                <span>Profiles</span>
                <button id="addConfigRowButton" type="button">Add Row</button>
              </div>

              <div class="mapping-table">
                <div class="mapping-header">
                  <span>Profile Name</span>
                  <span>Origin File</span>
                  <span>Subscription URL</span>
                  <span></span>
                </div>
                <div id="configRows"></div>
              </div>
            </section>

            <div id="profileModal" class="modal-overlay" hidden>
              <div class="modal-card">
                <div class="modal-header">
                  <h3 id="modalTitle">Edit Profile</h3>
                  <button id="modalClose" type="button">&times;</button>
                </div>
                <div class="modal-body">
                  <label><span>Profile Name<sup>*</sup></span><input id="modalName" type="text" placeholder="Unique profile name"></label>
                  <label><span>Origin File</span><input id="modalOriginFile" type="text"></label>
                  <label><span>Output File</span><input id="modalOutputFile" type="text"></label>
                  <label><span>Rewrite Output File</span><input id="modalRewriteOutputFile" type="text"></label>
                  <label><span>Subscription URL</span><input id="modalUrl" type="text" data-placeholder="http(s)://url"></label>
                  <label><span>User-Agent</span><input id="modalUserAgent" type="text" data-placeholder="clash"></label>
                  <label><span>Update Interval (s)</span><input id="modalInterval" type="number" data-placeholder="(0 means never update automatically)"></label>
                </div>
                <div class="modal-footer">
                  <button id="modalCancel" type="button">Cancel</button>
                  <button id="modalSave" class="primary-button" type="button">Save</button>
                </div>
              </div>
            </div>
            
          </section>

          <section id="rewriteView" class="view-panel" hidden>
            <div class="view-header">
              <div>
                <h2>Rewrite</h2>
                <p>Edit rewrite.js.</p>
              </div>
              <div class="button-row">
                <button id="copyRewriteButton" type="button">Copy</button>
                <button id="saveRewriteButton" class="primary-button" type="button">Save Rewrite</button>
              </div>
            </div>

            <section class="editor-panel">
              <div class="panel-title">
                <span>rewrite.js</span>
              </div>
              <div class="editor-body">
                <textarea id="rewriteEditor"></textarea>
              </div>
            </section>
          </section>

          <section id="filesView" class="view-panel" hidden>
            <div class="view-header">
              <div>
                <h2>Files</h2>
                <p id="previewSummary"></p>
              </div>
              <button id="copyPreviewButton" type="button">Copy Preview</button>
            </div>

            <div class="compare-layout">
              <section class="profile-panel">
                <div class="sidebar-header">Profiles</div>
                <div id="profileList" class="profile-list"></div>
              </section>

              <section class="compare-panel">
                <div class="preview-tabs">
                  <button class="tab-button active" type="button" data-preview="origin">Origin</button>
                  <button class="tab-button" type="button" data-preview="output">Output</button>
                  <button class="tab-button" type="button" data-preview="rewrite">Rewrite</button>
                </div>
                <div class="file-panel">
                  <div class="panel-title">
                    <span id="previewName"></span>
                    <button id="fetchSubscriptionButton" class="primary-button" type="button" hidden>Update</button>
                    <button id="saveFileButton" class="primary-button" type="button" hidden>Save File</button>
                    <button id="copyFileNameButton" type="button" hidden>Copy Name</button>
                  </div>
                  <div class="editor-area">
                    <textarea id="previewEditor" spellcheck="false" readonly></textarea>
                  </div>
                </div>
                <div id="subscriptionInfoBar" class="subscription-info-bar" hidden>
                  <span id="subUpload"></span>
                  <span id="subDownload"></span>
                  <span id="subTotal"></span>
                  <span id="subExpire"></span>
                  <span id="subUpdateTime"></span>
                </div>
              </section>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="/vendor/codemirror/lib/codemirror.js"></script>
    <script src="/vendor/codemirror/mode/javascript/javascript.js"></script>
    <script src="/vendor/codemirror/mode/yaml/yaml.js"></script>
    <script src="/vendor/codemirror/addon/edit/closebrackets.js"></script>
    <script src="/vendor/codemirror/addon/edit/matchbrackets.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
